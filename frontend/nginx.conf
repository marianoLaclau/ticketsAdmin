server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SSE: stream de eventos en vivo — sin buffering y con timeout largo,
    # si no nginx acumula los eventos y nunca llegan al navegador
    location /api/events {
        proxy_pass http://backend:5000/api/events;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: cualquier ruta que no sea un archivo estático cae en index.html
    # (el ruteo de páginas lo resuelve React/wouter en el cliente)
    location / {
        try_files $uri /index.html;
    }
}
