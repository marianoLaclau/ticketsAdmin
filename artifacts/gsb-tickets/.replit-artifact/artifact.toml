kind = "web"
previewPath = "/"
title = "GSB Tickets"
version = "1.0.0"
id = "artifacts/gsb-tickets"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24585

[services.development]
run = "pnpm --filter @workspace/gsb-tickets run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gsb-tickets", "run", "build" ]
serve = "static"
publicDir = "artifacts/gsb-tickets/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24585"
BASE_PATH = "/"
