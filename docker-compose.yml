name: ticketsadmin

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:?WEBHOOK_API_KEY is required — export it or set it in a .env next to this file}
      # Obligatoria: segunda credencial de las operaciones SysAdmin
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required — export it or set it in a .env next to this file}
      TICKETS_DB_PATH: /data/tickets.db
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    volumes:
      - tickets_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  tickets_data:
