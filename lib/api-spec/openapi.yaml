openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.5.0
  description: GSB Ticket Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tickets
    description: Ticket management
  - name: seguimientos
    description: Ticket follow-up tracking
  - name: dashboard
    description: Dashboard statistics
  - name: webhooks
    description: Ingesta automática de llamadas (n8n)
  - name: admin
    description: Gestión de la base de datos (CRUD manual, importación masiva, truncate)
  - name: auth
    description: >
      Autenticación por sesión. El login setea una cookie httpOnly; toda la API
      (salvo healthz, el webhook de n8n y el propio login) exige esa sesión.

security:
  - sessionCookie: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List all tickets with optional filters
      parameters:
        - name: estado
          in: query
          schema:
            type: string
            enum: [nuevo, en_proceso, pendiente, resuelto, cerrado]
        - name: prioridad
          in: query
          schema:
            type: string
            enum: [baja, media, alta, urgente]
        - name: fecha_desde
          in: query
          schema:
            type: string
            format: date
        - name: fecha_hasta
          in: query
          schema:
            type: string
            format: date
        - name: hora_desde
          in: query
          schema:
            type: string
        - name: hora_hasta
          in: query
          schema:
            type: string
        - name: empresa
          in: query
          schema:
            type: string
        - name: motivo
          in: query
          schema:
            type: string
        - name: motivo_categoria
          in: query
          description: Categoría normalizada derivada del motivo original
          schema:
            $ref: "#/components/schemas/MotivoCategoria"
        - name: search
          in: query
          schema:
            type: string
        - name: vencidos
          in: query
          schema:
            type: boolean
        - name: incluir_vacios
          in: query
          description: >
            Incluye registros en cuarentena sin datos útiles. Requiere sesión
            SysAdmin y el header x-admin-key; el listado operativo los excluye.
          schema:
            type: boolean
            default: false
        - name: sort_by
          in: query
          description: Columna de ordenamiento aplicada sobre el conjunto completo antes de paginar
          schema:
            $ref: "#/components/schemas/TicketSortBy"
            default: fecha_creacion
        - name: order
          in: query
          description: Orden compuesto por día de creación y, dentro de cada día, por hora del llamado
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: sort
          in: query
          description: >
            Ordenamiento múltiple priorizado, separado por comas y expresado
            como columna:dirección. Ejemplo:
            fecha_creacion:desc,contacto:asc. Cuando se informa, reemplaza a
            sort_by y order.
          schema:
            type: string
            maxLength: 512
          example: fecha_creacion:desc,contacto:asc
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListResponse"

  /tickets/export.csv:
    get:
      operationId: exportTicketsCsv
      tags: [tickets]
      summary: Exportar todos los tickets operativos que coinciden con los filtros
      parameters:
        - name: estado
          in: query
          schema:
            type: string
            enum: [nuevo, en_proceso, pendiente, resuelto, cerrado]
        - name: prioridad
          in: query
          schema:
            type: string
            enum: [baja, media, alta, urgente]
        - name: fecha_desde
          in: query
          schema:
            type: string
            format: date
        - name: fecha_hasta
          in: query
          schema:
            type: string
            format: date
        - name: hora_desde
          in: query
          schema:
            type: string
        - name: hora_hasta
          in: query
          schema:
            type: string
        - name: empresa
          in: query
          schema:
            type: string
        - name: motivo
          in: query
          schema:
            type: string
        - name: motivo_categoria
          in: query
          schema:
            $ref: "#/components/schemas/MotivoCategoria"
        - name: search
          in: query
          schema:
            type: string
        - name: vencidos
          in: query
          schema:
            type: boolean
        - name: sort_by
          in: query
          schema:
            $ref: "#/components/schemas/TicketSortBy"
            default: fecha_creacion
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: sort
          in: query
          description: >
            Ordenamiento múltiple priorizado, separado por comas y expresado
            como columna:dirección. Cuando se informa, reemplaza a sort_by y
            order.
          schema:
            type: string
            maxLength: 512
          example: fecha_creacion:desc,contacto:asc
      responses:
        "200":
          description: CSV UTF-8 con todos los resultados filtrados, sin paginación
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            text/csv:
              schema:
                type: string

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Iniciar sesión
      security: []
      description: >
        Valida usuario y contraseña. Si son correctos setea la cookie de sesión
        (httpOnly) y devuelve los datos del usuario.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Sesión iniciada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Credenciales inválidas o usuario inactivo

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Cerrar sesión
      description: Revoca la sesión actual y limpia la cookie.
      responses:
        "204":
          description: Sesión cerrada

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Usuario de la sesión actual
      responses:
        "200":
          description: Usuario autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Sin sesión válida

  /webhooks/ticket:
    post:
      operationId: ingestTicket
      tags: [webhooks]
      summary: Ingesta de una llamada desde n8n
      description: >
        Recibe el JSON que arma ElevenLabs al finalizar una llamada.
        Requiere el header x-api-key. Idempotente por conversation_id:
        si el ticket ya existe devuelve 200 con created=false.
      security:
        - webhookApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Ticket creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketIngestResult"
        "200":
          description: El ticket ya existía (reintento)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketIngestResult"
        "401":
          description: API key inválida

  /admin/tickets:
    post:
      operationId: createAdminTicket
      tags: [admin]
      summary: Crear un registro manualmente (solo administración)
      description: >
        Alta manual de un registro desde el panel de administración. El flujo
        normal de creación de tickets sigue siendo el webhook de n8n.
      security:
        - sessionCookie: []
          adminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Registro creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "401":
          description: Clave de administración inválida
        "409":
          description: Ya existe un ticket con ese conversation_id

  /admin/import:
    post:
      operationId: importCsv
      tags: [admin]
      summary: Importación masiva desde CSV
      description: >
        Recibe el contenido de un CSV (texto plano), detecta las columnas con
        los mismos alias que el importador CLI, y crea los registros que no
        existan. Idempotente por conversation_id. Con dry_run true solo simula
        y devuelve el resumen sin escribir nada.
      security:
        - sessionCookie: []
          adminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminImportInput"
      responses:
        "200":
          description: Resumen de la importación (o de la simulación)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminImportResult"
        "400":
          description: CSV inválido o sin columna conversation_id
        "401":
          description: Clave de administración inválida

  /admin/truncate:
    post:
      operationId: truncateTickets
      tags: [admin]
      summary: Borrar todos los registros (truncate)
      description: >
        Elimina TODOS los tickets y seguimientos y reinicia los contadores de
        id. El schema queda intacto. Requiere confirmar explícitamente.
      security:
        - sessionCookie: []
          adminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTruncateInput"
      responses:
        "200":
          description: Registros eliminados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTruncateResult"
        "400":
          description: Falta la confirmación explícita
        "401":
          description: Clave de administración inválida

  /admin/roles:
    get:
      operationId: listAdminRoles
      tags: [admin]
      summary: Listar roles
      security:
        - sessionCookie: []
          adminApiKey: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Lista paginada de roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRoleListResponse"
        "400":
          description: Parametros de consulta invalidos
        "401":
          description: Clave de administracion invalida

    post:
      operationId: createAdminRole
      tags: [admin]
      summary: Crear un rol
      security:
        - sessionCookie: []
          adminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRoleInput"
      responses:
        "201":
          description: Rol creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRole"
        "400":
          description: Cuerpo invalido
        "401":
          description: Clave de administracion invalida
        "409":
          description: Ya existe un rol con ese nombre

  /admin/roles/{id}:
    patch:
      operationId: updateAdminRole
      tags: [admin]
      summary: Actualizar un rol
      security:
        - sessionCookie: []
          adminApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRoleUpdate"
      responses:
        "200":
          description: Rol actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRole"
        "400":
          description: Id o cuerpo invalido
        "401":
          description: Clave de administracion invalida
        "404":
          description: Rol no encontrado
        "409":
          description: Ya existe un rol con ese nombre

    delete:
      operationId: deleteAdminRole
      tags: [admin]
      summary: Eliminar un rol sin usuarios asignados
      security:
        - sessionCookie: []
          adminApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: Rol eliminado
        "400":
          description: Id invalido
        "401":
          description: Clave de administracion invalida
        "404":
          description: Rol no encontrado
        "409":
          description: El rol tiene usuarios asignados

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: Listar usuarios
      security:
        - sessionCookie: []
          adminApiKey: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: role_id
          in: query
          schema:
            type: integer
            minimum: 1
        - name: activo
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Lista paginada de usuarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "400":
          description: Parametros de consulta invalidos
        "401":
          description: Clave de administracion invalida

    post:
      operationId: createAdminUser
      tags: [admin]
      summary: Crear un usuario
      security:
        - sessionCookie: []
          adminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserInput"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Cuerpo invalido o rol inexistente
        "401":
          description: Clave de administracion invalida
        "409":
          description: Ya existe un usuario con ese email

  /admin/users/{id}:
    patch:
      operationId: updateAdminUser
      tags: [admin]
      summary: Actualizar o desactivar un usuario
      description: Los usuarios se desactivan estableciendo activo en false; no se eliminan.
      security:
        - sessionCookie: []
          adminApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "400":
          description: Id o cuerpo invalido
        "401":
          description: Clave de administracion invalida
        "404":
          description: Usuario o rol no encontrado
        "409":
          description: Ya existe un usuario con ese email

  /admin/users/{id}/password:
    post:
      operationId: resetAdminUserPassword
      tags: [admin]
      summary: Establecer o reestablecer la contraseña de un usuario
      description: >
        Asigna una contraseña nueva al usuario (hasheada con scrypt) y revoca
        todas sus sesiones activas: si estaba logueado en algún navegador,
        queda afuera y debe volver a entrar con la clave nueva.
      security:
        - sessionCookie: []
          adminApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserPasswordInput"
      responses:
        "204":
          description: Contraseña actualizada y sesiones revocadas
        "400":
          description: Id o cuerpo invalido
        "401":
          description: Clave de administracion invalida
        "404":
          description: Usuario no encontrado

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: incluir_vacios
          in: query
          description: Permite abrir registros en cuarentena; requiere SysAdmin y x-admin-key
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "404":
          description: Not found

    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update a ticket
      description: |
        Las actualizaciones operativas y el enriquecimiento de contacto,
        motivo o resumen requieren una sesión válida. Los campos técnicos y
        el acceso a registros en cuarentena requieren además rol SysAdmin y
        el header x-admin-key.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: incluir_vacios
          in: query
          description: Permite modificar registros en cuarentena; requiere SysAdmin y x-admin-key
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdate"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "401":
          description: Sesion requerida o clave de administracion invalida
        "403":
          description: La edicion administrativa requiere rol SysAdmin
        "503":
          description: ADMIN_API_KEY no esta configurada en el servidor

    delete:
      operationId: deleteTicket
      tags: [tickets]
      summary: Delete a ticket (solo SysAdmin con clave administrativa)
      description: Requiere sesion con rol SysAdmin y el header x-admin-key.
      security:
        - sessionCookie: []
          adminApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Clave de administracion invalida
        "403":
          description: Requiere rol SysAdmin
        "503":
          description: ADMIN_API_KEY no esta configurada en el servidor

  /tickets/{id}/seguimientos:
    get:
      operationId: listSeguimientos
      tags: [seguimientos]
      summary: List follow-ups for a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: incluir_vacios
          in: query
          description: Permite consultar un registro en cuarentena desde Admin
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: List of follow-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Seguimiento"

    post:
      operationId: createSeguimiento
      tags: [seguimientos]
      summary: Add a follow-up to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: incluir_vacios
          in: query
          description: Permite agregar seguimiento a un registro en cuarentena desde Admin
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeguimientoInput"
      responses:
        "201":
          description: Created follow-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Seguimiento"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      parameters:
        - $ref: "#/components/parameters/DashboardFechaDesde"
        - $ref: "#/components/parameters/DashboardFechaHasta"
      responses:
        "400":
          description: Invalid dashboard date range
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/actividad-reciente:
    get:
      operationId: getActividadReciente
      tags: [dashboard]
      summary: Get recent ticket activity
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - $ref: "#/components/parameters/DashboardFechaDesde"
        - $ref: "#/components/parameters/DashboardFechaHasta"
      responses:
        "400":
          description: Invalid dashboard date range
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActividadItem"

  /dashboard/tickets-vencidos:
    get:
      operationId: getTicketsVencidos
      tags: [dashboard]
      summary: Get overdue tickets
      parameters:
        - $ref: "#/components/parameters/DashboardFechaDesde"
        - $ref: "#/components/parameters/DashboardFechaHasta"
      responses:
        "400":
          description: Invalid dashboard date range
        "200":
          description: Overdue tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /dashboard/motivos:
    get:
      operationId: getMotivoStats
      tags: [dashboard]
      summary: Get ticket counts grouped by normalized contact category
      parameters:
        - $ref: "#/components/parameters/DashboardFechaDesde"
        - $ref: "#/components/parameters/DashboardFechaHasta"
      responses:
        "400":
          description: Invalid dashboard date range
        "200":
          description: Contact category statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MotivoStat"

components:
  parameters:
    DashboardFechaDesde:
      name: fecha_desde
      in: query
      description: Primer dia incluido en el periodo del dashboard (YYYY-MM-DD).
      schema:
        type: string
        format: date
    DashboardFechaHasta:
      name: fecha_hasta
      in: query
      description: Ultimo dia incluido en el periodo del dashboard (YYYY-MM-DD).
      schema:
        type: string
        format: date

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: gsb_session
      description: Cookie httpOnly emitida por POST /auth/login y validada por el backend.
    webhookApiKey:
      type: apiKey
      in: header
      name: x-api-key
    adminApiKey:
      type: apiKey
      in: header
      name: x-admin-key
      description: Segunda verificacion obligatoria, utilizable solo junto a una sesion SysAdmin.

  schemas:
    LoginInput:
      type: object
      required:
        - usuario
        - password
      properties:
        usuario:
          type: string
          description: Nombre de usuario asignado al crear la cuenta (no el email)
        password:
          type: string

    AuthUser:
      type: object
      required:
        - id
        - nombre
        - email
        - rol
      properties:
        id:
          type: integer
        nombre:
          type: string
        apellido:
          type: ["string", "null"]
        email:
          type: string
        rol:
          type: string
          description: Nombre del rol asignado

    AdminRole:
      type: object
      required:
        - id
        - nombre
        - descripcion
        - activo
        - fecha_creacion
        - fecha_actualizacion
      properties:
        id:
          type: integer
        nombre:
          type: string
